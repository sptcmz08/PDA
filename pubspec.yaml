name: pda_tracking_scanner
description: Offline PDA tracking scanner app for Android keyboard wedge input.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  intl: ^0.19.0
  audioplayers: ^6.0.0
  syncfusion_flutter_xlsio: ^33.2.13+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
